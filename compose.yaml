services:
  psql:
    image: postgres:latest
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${PSQL_USER:-test}
      POSTGRES_PASSWORD: ${PSQL_PASSWORD:-test}

    volumes:
      - postgresql_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  mongo:
    image: mongo:latest
    restart: unless-stopped

    environment:
        MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-test}
        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-test}

    volumes:
      - mongodb_data:/data/db
    
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    restart: unless-stopped

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"
  
  os-node:
    image: opensearchproject/opensearch:3.1.0
    restart: unless-stopped

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    environment:
      node.name: os-node
      discovery.seed_hosts: os-node

      cluster.name: os-cluster
      cluster.initial_cluster_manager_nodes: os-node
      
      bootstrap.memory_lock: true

      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OS_PASSWORD:-Test42069!.?}

    volumes:
      - opensearch_data:/usr/share/opensearch/data

    ports:
      - 9200:9200

    networks:
      - opensearch_net

  os-dash:
    image: opensearchproject/opensearch-dashboards:3.1.0
    
    environment:
      OPENSEARCH_HOSTS: '["https://os-node:9200"]'
    
    ports:
      - 5601:5601

    networks:
      - opensearch_net

volumes:
  postgresql_data:
  mongodb_data:
  redis_data:
  opensearch_data:

networks:
  opensearch_net: